id: "AILE-0015"
title: "Fix pre-push hook recursion when syncing ledger branch"
date: "2026-03-06"
author: "codex"

intent:
  summary: "Prevent recursive git pushes and hanging behavior in the CLI-managed pre-push hook."
  reason: "The hook invokes git push from inside pre-push, which can recursively invoke itself and hang user pushes."
  risk_level: "medium"

scope:
  expected:
    - "packages/cli/src/index.ts"
    - "packages/cli/README.md"
    - "CHANGELOG.md"
    - ".ai-ledger/contracts/**"
    - ".ai-ledger/entries/**"
  forbidden:
    - "infra/**"
    - "auth/**"
    - "supabase/migrations/**"

verification:
  expected_tests:
    - "pnpm --filter @ai-ledger/cli build"
    - "node packages/cli/dist/index.js init"
  manual_checks:
    - "Confirm init no longer fails when pre-push hook cannot be written; it should warn and continue."
    - "Inspect generated pre-push hook content and confirm recursion protection (`--no-verify` + guard)."

review:
  requires_human_approval: false

links:
  entry: ".ai-ledger/entries/2026-03-06-fix-pre-push-hook-recursion.md"
  pr: ""
  issue: ""
