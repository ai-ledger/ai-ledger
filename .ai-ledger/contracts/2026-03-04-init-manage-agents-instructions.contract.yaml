id: "AILE-0007"
title: "Have init create or append required AGENTS.md setup guidance"
date: "2026-03-04"
author: "codex"

intent:
  summary: "Update CLI init to create AGENTS.md when missing or append a managed AI Ledger guidance block when present."
  reason: "Users need consistent agent setup instructions applied automatically during initialization."
  risk_level: "low"

scope:
  expected:
    - "packages/cli/src/index.ts"
    - "packages/cli/README.md"
  forbidden:
    - "infra/**"
    - "auth/**"
    - "supabase/migrations/**"

verification:
  expected_tests:
    - "pnpm --filter @ai-ledger/cli build"
    - "tmpdir=$(mktemp -d) && cp -R /workspace/ai-ledger/. \"$tmpdir\" && cd \"$tmpdir\" && git init -q && node packages/cli/dist/index.js init && test -f AGENTS.md && rg -n \"Create a contract before meaningful changes\" AGENTS.md"
    - "tmpdir=$(mktemp -d) && cp -R /workspace/ai-ledger/. \"$tmpdir\" && cd \"$tmpdir\" && printf \"# Existing\\n\" > AGENTS.md && node packages/cli/dist/index.js init && rg -n \"# Existing\" AGENTS.md && rg -n \"AI Ledger Required Setup \(managed by ai-ledger init\)\" AGENTS.md"
  manual_checks:
    - "Confirm rerunning init does not duplicate the managed AGENTS block."

review:
  requires_human_approval: false

links:
  entry: ".ai-ledger/entries/2026-03-04-init-manage-agents-instructions.md"
  pr: ""
  issue: ""
