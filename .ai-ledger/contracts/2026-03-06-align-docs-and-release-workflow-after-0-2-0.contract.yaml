id: "AILE-1772822938198"
title: "Align docs and release workflow after 0.2.0"
date: "2026-03-06"
author: "codex"

intent:
  summary: "Align repository docs with detached ledger storage behavior and harden tag-based publish workflow to skip already-published package versions."
  reason: "After shipping CLI 0.2.0 and migrating this repository to detached storage, documentation and release automation still have outdated assumptions that can confuse contributors or fail tag workflows."
  risk_level: "low" # low | medium | high

scope:
  expected:
    - "README.md"
    - "AGENTS.md"
    - ".github/workflows/ai-ledger-basic.yml"
    - ".github/workflows/publish.yml"
    - "CHANGELOG.md"
  forbidden:
    - "infra/**"
    - "auth/**"
    - "supabase/migrations/**"

verification:
  expected_tests:
    - "pnpm --filter @ai-ledger/cli build"
    - "node packages/cli/dist/index.js check"
  manual_checks:
    - "Verify README and AGENTS instructions no longer claim this repository stores contracts/entries in workspace mode."
    - "Verify publish workflow skips npm publish when package version already exists."

review:
  requires_human_approval: false

links:
  entry: ".ai-ledger/entries/2026-03-06-align-docs-and-release-workflow-after-0-2-0.md"
  pr: ""    # optional
  issue: "" # optional