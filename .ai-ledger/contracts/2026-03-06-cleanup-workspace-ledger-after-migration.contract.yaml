id: "AILE-0010"
title: "Clean up workspace .ai-ledger/contracts and entries after migration"
date: "2026-03-06"
author: "codex"

intent:
  summary: "Delete workspace .ai-ledger/contracts and entries files after they have been safely migrated into the detached ledger branch."
  reason: "Once canonical contracts and entries live on the dedicated ledger branch, keeping duplicate copies in the workspace is confusing; cleaning them up clarifies that the branch/worktree is the source of truth."
  risk_level: "medium"

scope:
  expected:
    - "packages/cli/src/index.ts"
    - ".ai-ledger/contracts/**"
    - ".ai-ledger/entries/**"
  forbidden:
    - "infra/**"
    - "auth/**"
    - "supabase/migrations/**"

verification:
  expected_tests:
    - "pnpm --filter @ai-ledger/cli build"
    - "tmpdir=$(mktemp -d) && cp -R . \"$tmpdir\" && cd \"$tmpdir\" && git init -q && mkdir -p .ai-ledger/contracts .ai-ledger/entries && cp .ai-ledger/templates/contract.yaml .ai-ledger/contracts/2026-03-06-cleanup-test.contract.yaml && cp .ai-ledger/templates/entry.md .ai-ledger/entries/2026-03-06-cleanup-test.md && pnpm --filter @ai-ledger/cli build >/dev/null && node packages/cli/dist/index.js init && test ! -f .ai-ledger/contracts/2026-03-06-cleanup-test.contract.yaml && test ! -f .ai-ledger/entries/2026-03-06-cleanup-test.md"
  manual_checks:
    - "After init, confirm migrated files exist on the ledger branch/worktree and are no longer present in the workspace .ai-ledger/contracts and .ai-ledger/entries folders, except for any reported conflicts."

review:
  requires_human_approval: false

links:
  entry: ".ai-ledger/entries/2026-03-06-cleanup-workspace-ledger-after-migration.md"
  pr: ""
  issue: ""

