id: "AILE-20260303-storage-naming"
title: "Simplify detached storage naming for branch and worktree"
date: "2026-03-03"
author: "codex"

intent:
  summary: "Use simpler default names for detached ledger branch/worktree and document naming rationale."
  reason: "Users found `ai-ledger/log/v1` and `.git/.ai-ledger-log` naming confusing and wanted cleaner terminology."
  risk_level: "low"

scope:
  expected:
    - "packages/cli/src/**"
    - "packages/cli/README.md"
    - "README.md"
    - ".ai-ledger/contracts/**"
    - ".ai-ledger/entries/**"
  forbidden:
    - "spec/**"
    - "packages/spec/**"
    - "infra/**"
    - "auth/**"
    - "supabase/migrations/**"

verification:
  expected_tests:
    - "pnpm --filter @ai-ledger/cli build"
    - "node packages/cli/dist/index.js --help"
  manual_checks:
    - "Smoke test init/new/check in a temp git repo to confirm detached storage still works with new defaults"

review:
  requires_human_approval: false

links:
  entry: ".ai-ledger/entries/2026-03-03-simplify-detached-storage-naming.md"
  pr: ""
  issue: ""
