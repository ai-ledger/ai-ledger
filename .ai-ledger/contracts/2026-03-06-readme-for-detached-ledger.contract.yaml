id: "AILE-0009"
title: "Add .ai-ledger README explaining detached ledger branch"
date: "2026-03-06"
author: "codex"

intent:
  summary: "Ensure projects have a .ai-ledger/README.md that explains where contracts and entries live when using git-branch storage."
  reason: "Developers inspecting .ai-ledger on their working branches should quickly understand that canonical records are stored on a separate ledger branch via git worktree."
  risk_level: "low"

scope:
  expected:
    - "packages/cli/src/index.ts"
    - ".ai-ledger/contracts/**"
    - ".ai-ledger/entries/**"
  forbidden:
    - "infra/**"
    - "auth/**"
    - "supabase/migrations/**"

verification:
  expected_tests:
    - "pnpm --filter @ai-ledger/cli build"
    - "tmpdir=$(mktemp -d) && cp -R . \"$tmpdir\" && cd \"$tmpdir\" && git init -q && pnpm --filter @ai-ledger/cli build >/dev/null && node packages/cli/dist/index.js init && test -f .ai-ledger/README.md"
  manual_checks:
    - "Inspect .ai-ledger/README.md to confirm it documents git-branch storage, the ledger branch name, and where contracts/entries actually live."

review:
  requires_human_approval: false

links:
  entry: ".ai-ledger/entries/2026-03-06-readme-for-detached-ledger.md"
  pr: ""
  issue: ""

