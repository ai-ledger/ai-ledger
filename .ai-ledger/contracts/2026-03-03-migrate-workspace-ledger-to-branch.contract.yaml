id: "AILE-0006"
title: "Migrate existing workspace ledger files into detached ledger branch"
date: "2026-03-03"
author: "codex"

intent:
  summary: "When using git-branch storage, initialize detached ledger storage and migrate existing workspace contracts/entries into it."
  reason: "Users already using AI Ledger in workspace mode need a smooth path to detached storage without losing prior records."
  risk_level: "medium"

scope:
  expected:
    - "packages/cli/src/index.ts"
    - "packages/cli/README.md"
  forbidden:
    - "infra/**"
    - "auth/**"
    - "supabase/migrations/**"

verification:
  expected_tests:
    - "pnpm --filter @ai-ledger/cli build"
    - "tmpdir=$(mktemp -d) && cp -R /workspace/ai-ledger/. \"$tmpdir\" && cd \"$tmpdir\" && git init -q && mkdir -p .ai-ledger/contracts .ai-ledger/entries && cp .ai-ledger/templates/contract.yaml .ai-ledger/contracts/2026-03-03-old.contract.yaml && cp .ai-ledger/templates/entry.md .ai-ledger/entries/2026-03-03-old.md && node packages/cli/dist/index.js init && test -f .git/.ai-ledger/worktree/.ai-ledger/contracts/2026-03-03-old.contract.yaml && test -f .git/.ai-ledger/worktree/.ai-ledger/entries/2026-03-03-old.md"
  manual_checks:
    - "Confirm init output reports migration counts and warns on conflicts if files differ."

review:
  requires_human_approval: false

links:
  entry: ".ai-ledger/entries/2026-03-03-migrate-workspace-ledger-to-branch.md"
  pr: ""
  issue: ""
