id: "AILE-0008"
title: "Bump CLI package version to 0.2.0 for release"
date: "2026-03-04"
author: "codex"

intent:
  summary: "Prepare the CLI package for publishing by increasing its version from 0.1.0 to 0.2.0."
  reason: "The detached storage/migration/AGENTS init changes are significant enough to warrant a minor release bump."
  risk_level: "low"

scope:
  expected:
    - "packages/cli/package.json"
    - "packages/cli/src/index.ts"
  forbidden:
    - "infra/**"
    - "auth/**"
    - "supabase/migrations/**"

verification:
  expected_tests:
    - "pnpm --filter @ai-ledger/cli build"
    - "node packages/cli/dist/index.js --version"
  manual_checks:
    - "Confirm package.json and CLI-reported version both show 0.2.0."

review:
  requires_human_approval: false

links:
  entry: ".ai-ledger/entries/2026-03-04-bump-cli-version-0-2-0.md"
  pr: ""
  issue: ""
