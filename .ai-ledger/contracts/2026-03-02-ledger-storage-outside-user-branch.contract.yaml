id: "AILE-20260302-ledger-storage"
title: "Store AI Ledger logs outside the active branch history"
date: "2026-03-02"
author: "codex"

intent:
  summary: "Add a detached git-ref storage mode so contracts/entries no longer spam user commits by default."
  reason: "Users want AI Ledger records to remain useful without polluting their working branch and commit history."
  risk_level: "medium"

scope:
  expected:
    - "packages/cli/src/**"
    - "packages/cli/README.md"
    - "spec/**"
    - "README.md"
    - ".ai-ledger/entries/**"
    - ".ai-ledger/contracts/**"
  forbidden:
    - "packages/spec/**"
    - "infra/**"
    - "auth/**"
    - "supabase/migrations/**"

verification:
  expected_tests:
    - "pnpm --filter @ai-ledger/cli build"
    - "node packages/cli/dist/index.js --help"
  manual_checks:
    - "Initialize ledger and create new entry to verify logs are written in detached storage mode"

review:
  requires_human_approval: false

links:
  entry: ".ai-ledger/entries/2026-03-02-ledger-storage-outside-user-branch.md"
  pr: ""
  issue: ""
