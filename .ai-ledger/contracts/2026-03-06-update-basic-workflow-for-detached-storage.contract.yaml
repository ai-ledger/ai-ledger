id: "AILE-0012"
title: "Update basic CI workflow for detached ledger storage"
date: "2026-03-06"
author: "codex"

intent:
  summary: "Teach the CLI init command to update the stock ai-ledger-basic.yml workflow so it works with git-branch storage."
  reason: "Projects that upgrade to CLI 0.2.0 and switch to git-branch storage would otherwise see their existing AI Ledger CI checks fail because no new files appear under .ai-ledger/contracts or .ai-ledger/entries in feature branches."
  risk_level: "medium"

scope:
  expected:
    - "packages/cli/src/index.ts"
  forbidden:
    - "infra/**"
    - "auth/**"
    - "supabase/migrations/**"

verification:
  expected_tests:
    - "pnpm --filter @ai-ledger/cli build"
    - "tmpdir=$(mktemp -d) && cd \"$tmpdir\" && git init -q && npm init -y >/dev/null && mkdir -p .ai-ledger/contracts .ai-ledger/entries .github/workflows && cp -R /Users/joonas/dev/ai-ledger/ai-ledger/.ai-ledger/templates .ai-ledger/ && cp /Users/joonas/dev/ai-ledger/ai-ledger/.github/workflows/ai-ledger-basic.yml .github/workflows/ai-ledger-basic.yml && npx @ai-ledger/cli@0.2.0 init || true && node /Users/joonas/dev/ai-ledger/ai-ledger/packages/cli/dist/index.js init && grep -q \"AI Ledger check\" .github/workflows/ai-ledger-basic.yml"
  manual_checks:
    - "Inspect a repo that had the old ai-ledger-basic.yml after running init and verify the workflow now calls the CLI check instead of grepping .ai-ledger/contracts and .ai-ledger/entries."

review:
  requires_human_approval: false

links:
  entry: ".ai-ledger/entries/2026-03-06-update-basic-workflow-for-detached-storage.md"
  pr: ""
  issue: ""

