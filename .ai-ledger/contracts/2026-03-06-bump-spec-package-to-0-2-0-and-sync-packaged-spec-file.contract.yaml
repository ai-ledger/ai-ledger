id: "AILE-1772823524709"
title: "Bump spec package to 0.2.0 and sync packaged spec file"
date: "2026-03-06"
author: "codex"

intent:
  summary: "Publish @ai-ledger/spec as 0.2.0 and sync its bundled spec copy with the current root spec content."
  reason: "The CLI is now 0.2.0 and the packaged spec currently lags root spec guidance; aligning package version/content avoids version confusion and stale published spec behavior."
  risk_level: "low" # low | medium | high

scope:
  expected:
    - "packages/spec/package.json"
    - "packages/spec/spec/v0.1.md"
    - "CHANGELOG.md"
  forbidden:
    - "infra/**"
    - "auth/**"
    - "supabase/migrations/**"

verification:
  expected_tests:
    - "pnpm --filter @ai-ledger/cli build"
    - "node packages/cli/dist/index.js check"
  manual_checks:
    - "Confirm packages/spec/spec/v0.1.md matches spec/v0.1.md."
    - "Confirm @ai-ledger/spec package.json version is 0.2.0."

review:
  requires_human_approval: false

