id: "AILE-0005"
title: "Drop pre-merge legacy worktree compatibility"
date: "2026-03-03"
author: "codex"

intent:
  summary: "Remove unused backward compatibility for the old ledger worktree path and align docs with the simplified naming."
  reason: "The feature has not merged yet, so compatibility code adds complexity without user value."
  risk_level: "low"

scope:
  expected:
    - "packages/cli/src/index.ts"
    - "packages/cli/README.md"
  forbidden:
    - "infra/**"
    - "auth/**"
    - "supabase/migrations/**"

verification:
  expected_tests:
    - "pnpm --filter @ai-ledger/cli build"
    - "tmpdir=$(mktemp -d) && cp -R /workspace/ai-ledger/. \"$tmpdir\" && cd \"$tmpdir\" && git init -q && pnpm --filter @ai-ledger/cli build >/dev/null && node packages/cli/dist/index.js init && node packages/cli/dist/index.js new --title \"compat removal smoke\" && git -C .git/.ai-ledger/worktree rev-parse --abbrev-ref HEAD"
  manual_checks:
    - "Confirm docs no longer mention auto-detecting .git/.ai-ledger-log."

review:
  requires_human_approval: false

links:
  entry: ".ai-ledger/entries/2026-03-03-drop-legacy-worktree-compat.md"
  pr: ""
  issue: ""
